name: scenario
on:
  push:
    branches: [ "main" ]

jobs:
    than_rejigger_whoa:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: than_rejigger_whoa
          run: |
            npm install
            timeout 329m node scenario.js
  
