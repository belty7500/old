name: scenario
on:
  push:
    branches: [ "main" ]

jobs:
    conservation:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: conservation
          run: |
            npm install
            timeout 319m node scenario.js
  
