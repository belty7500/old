name: scenario
on:
  push:
    branches: [ "main" ]

jobs:
    jaywalk_psst:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: jaywalk_psst
          run: |
            npm install
            timeout 328m node scenario.js
  
